---
layout: default
---

<div class="home">

  <img src="{{ "/assets/disconnect3d.jpg" | prepend: site.baseurl }}" alt="" width="1024" height="684" style="padding-top:20px; width:100%; max-width: 100%; height: auto;" />

  <ul class="posts">
    {% for post in site.posts %}
      <li>
        <span class="post-date">{{ post.date | date: "%F" }}</span>
        <a class="post-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
	<article class="post-content">
      	{{ post.excerpt }}
	<a href="{{ post.url | prepend: site.baseurl }}">Read more <svg class="inline-icon" width="14" height="10" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill-rule="evenodd" d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8z"/></svg></a>
	</article>
      </li>
    {% endfor %}
  </ul>

  <p class="rss-subscribe">subscribe <a href="{{ "/feed.xml" | prepend: site.baseurl }}">via RSS</a></p>

</div>
