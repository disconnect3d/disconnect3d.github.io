---
layout: default
---

<div class="home">

  <img src="{{ "/assets/disconnect3d.jpg" | prepend: site.baseurl }}" alt="disconnect3d" style="padding-top:20px; width:100%; max-width: 100%; height: auto;" />

  <ul class="posts">
    {% for post in site.posts %}
      <li>
        <span class="post-date">{{ post.date | date: "%F" }}</span>
        <a class="post-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
	<article class="post-content">
      	{{ post.excerpt }}
	<a href="{{ post.url | prepend: site.baseurl }}">Read more <i class="fa fa-long-arrow-right" aria-hidden="true"></i></a>
	</article>
      </li>
    {% endfor %}
  </ul>

  <p class="rss-subscribe">subscribe <a href="{{ "/feed.xml" | prepend: site.baseurl }}">via RSS</a></p>

</div>
